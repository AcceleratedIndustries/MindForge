name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install "bandit[toml]"
      - run: bandit -r mindforge -c pyproject.toml

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
        # Upgrade pip itself before auditing — the runner ships a pip whose
        # version periodically picks up new advisories (e.g. CVE-2026-6357 in
        # pip 26.0.1, fixed in 26.1). Bumping pip is the canonical fix and
        # avoids growing the --ignore-vuln list with pip-self CVEs.
      - run: pip install --upgrade pip pip-audit
        # CVE-2026-3219 affects pip itself and has no fix version published
        # yet. Drop the ignore once pip ships a patched release.
      - run: pip-audit --strict --ignore-vuln CVE-2026-3219

  gitleaks:
    # Uses the gitleaks CLI directly — free for org repos. The action wrapper
    # requires a paid license for organizations.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.29.1
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/
          gitleaks version
      - name: Scan with gitleaks
        run: gitleaks detect --source . --redact --no-banner --verbose
