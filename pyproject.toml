[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mindforge"
version = "0.1.0"
description = "A semantic memory engine that transforms AI conversation transcripts into a structured, queryable knowledge base."
requires-python = ">=3.10"
license = { text = "BUSL-1.1" }

dependencies = [
    "networkx>=3.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
embeddings = [
    "sentence-transformers>=2.2.0",
    "faiss-cpu>=1.7.0",
    "numpy>=1.24.0",
]
mcp = [
    "mcp>=1.0.0",
]
eval = [
    "pyyaml>=6.0",
]
all = [
    "mindforge[embeddings,mcp,eval]",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=1.0",
    "pytest-cov>=5",
    "pyyaml>=6.0",
    "ruff>=0.8",
    "mypy>=1.13",
    "hypothesis>=6",
    "bandit[toml]>=1.7",
]

[project.scripts]
mindforge = "mindforge.cli:main"

[tool.setuptools.packages.find]
include = ["mindforge*"]

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.mypy]
python_version = "3.10"
strict = true
files = ["mindforge"]

[tool.bandit]
exclude_dirs = ["tests"]
